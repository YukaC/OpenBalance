name: CI

on:
  push:
    branches:
      - main
      - cursor/**
  pull_request:
    branches:
      - main
      - cursor/**

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit
        env:
          # Stubs so Auth.js / Drizzle imports typecheck without a live DB
          AUTH_SECRET: ci-typecheck-secret-not-for-production
          DATABASE_URL: ""

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ci-build-secret-not-for-production
          DATABASE_URL: ""
          AUTH_URL: http://localhost:3000
