name: CI

on:
  push:
    branches:
      - main
      - feat/**
      - cursor/**
  pull_request:
    branches:
      - main
      - feat/**
      - cursor/**

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test
        env:
          AUTH_SECRET: ci-test-secret-not-for-production

      - name: Typecheck
        run: pnpm typecheck
        env:
          AUTH_SECRET: ci-typecheck-secret-not-for-production
          DATABASE_URL: ""

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          AUTH_SECRET: ci-build-secret-not-for-production
          DATABASE_URL: ""
          AUTH_URL: http://localhost:3000
